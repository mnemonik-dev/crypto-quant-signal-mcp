name: Regenerate Landing from Manifests

# WEBSITE-REFRESH-W1 C8 — receives `repository_dispatch` from algovault-skills
# (or manual workflow_dispatch). Checks out both repos as siblings, runs the
# manifest-driven build script, commits regenerated surfaces if changed, and
# pushes — which triggers the standard deploy.yml on the same branch.
#
# Total round-trip from manifest edit to live algovault.com update: ~2 min.

on:
  repository_dispatch:
    types: [manifest-changed]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Self-trigger on direct edits of manifests if cross-repo sync is bypassed.
      # NOTE: this path won't typically fire because manifests live in the sibling
      # repo, but listed for safety in case someone vendors the manifests here.
      - 'skills/manifest.json'
      - 'integrations/manifest.json'

permissions:
  # Default GITHUB_TOKEN is read-only on contents (per GitHub 2023+ org defaults).
  # The "Commit regenerated surfaces" step needs write access to push back to main.
  # The push triggers deploy.yml on the same branch (with [skip ci] tag in the
  # commit message to prevent the regenerate job from re-running on its own
  # commit — though deploy.yml fires regardless because that workflow doesn't
  # respect skip-ci tags; deploy is exactly what we want as the side effect).
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout crypto-quant-signal-mcp
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout algovault-skills (in-workspace subdir)
        uses: actions/checkout@v4
        with:
          repository: AlgoVaultLabs/algovault-skills
          # actions/checkout confines paths to the workspace dir, so a sibling
          # `../algovault-skills` is rejected. Check into ./algovault-skills/
          # instead; the build script's __dirname-relative path resolution
          # (../scripts → ../) works identically inside the in-workspace subdir.
          path: algovault-skills
          fetch-depth: 1

      - name: Run build script
        run: |
          node algovault-skills/scripts/build_landing.mjs --target .

      - name: Clean up sibling-checkout (so it doesn't get committed in next step)
        run: rm -rf algovault-skills

      - name: Commit regenerated surfaces (if any)
        env:
          DISPATCH_REPO: ${{ github.event.client_payload.source_repo }}
          DISPATCH_SHA: ${{ github.event.client_payload.source_sha }}
          DISPATCH_ACTOR: ${{ github.event.client_payload.source_actor }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.email "ci@algovault.com"
            git config user.name "AlgoVault CI"
            git add landing/skills.html landing/index.html landing/llms.txt landing/llms-full.txt README.md
            git commit -m "build(landing): regenerate from manifests [skip ci]" -m "Triggered by repository_dispatch from ${DISPATCH_REPO:-self} (sha ${DISPATCH_SHA:-n/a}, actor ${DISPATCH_ACTOR:-n/a})."
            git push
          else
            echo "No surface changes; skipping commit."
          fi
